<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avances de Tesis · SMMyE — Ignacio Andrade</title>

  <!-- Estilos (separados) -->
  <link rel="stylesheet" href="css/theme.css?v=5" />
  <link rel="stylesheet" href="css/slides.css?v=9" />
  <link rel="stylesheet" href="css/components.css?v=7" />
  <link rel="stylesheet" href="css/animations.css?v=4" />
</head>
<body>
  <!-- Barra de progreso superior -->
  <div id="progress" class="progress"><span></span></div>

  <!-- Escudo UDG fijo -->
  <img class="logo-corner" src="assets/LogoUdG.png" alt="Universidad de Guadalajara" />

  <!-- Contenedor de diapositivas (se llenan desde js/slides) -->
  <main id="deck" class="deck" aria-live="polite"></main>

  <!-- Controles inferiores -->
  <nav class="controls" aria-label="Controles de presentación">
    <button id="btnPrev" class="ctrl" title="Anterior (←)">‹</button>
    <span id="counter" class="counter">1 / 1</span>
    <button id="btnNext" class="ctrl" title="Siguiente (→)">›</button>
    <span class="sep"></span>
    <button id="btnTheme" class="ctrl" title="Modo claro / oscuro (T)">◐</button>
    <button id="btnFull" class="ctrl" title="Pantalla completa (F · doble clic)">⛶</button>
  </nav>

  <!-- Puntos de navegación -->
  <div id="dots" class="dots" aria-label="Índice de diapositivas"></div>

  <!-- Pista de ayuda (se desvanece) -->
  <div id="hint" class="hint">
    Doble clic = pantalla completa · ← → para navegar · T para tema
  </div>

  <!-- Registro de diapositivas -->
  <script src="js/slides-registry.js?v=4"></script>
  <!-- Íconos SVG y mascotas (deben cargar antes que las diapositivas) -->
  <script src="js/icons.js?v=4"></script>
  <script src="js/characters.js?v=4"></script>

  <!-- Diapositivas (el orden de carga define el orden de la presentación) -->
  <script src="slides/slide-01-portada.js?v=6"></script>
  <script src="slides/slide-02-agenda.js?v=4"></script>
  <script src="slides/slide-03-problema.js?v=5"></script>
  <script src="slides/slide-04-justificacion.js?v=5"></script>
  <script src="slides/slide-05-objetivos.js?v=5"></script>
  <script src="slides/slide-06-marco-teorico.js?v=10"></script>
  <script src="slides/slide-06b-preguntas.js?v=11"></script>
  <script src="slides/slide-07-estado-arte-rsl.js?v=9"></script>
  <script src="slides/slide-08-estado-arte-brecha.js?v=5"></script>
  <script src="slides/slide-09-metodologia.js?v=11"></script>
  <script src="slides/slide-10-arquitectura.js?v=5"></script>
  <script src="slides/slide-11-software-hardware.js?v=10"></script>
  <script src="slides/slide-12-requerimientos.js?v=6"></script>
  <script src="slides/slide-12b-avance-sistema.js?v=2"></script>
  <script src="slides/slide-12c-avance-sistema-2.js?v=1"></script>
  <script src="slides/slide-02c-observaciones-protocolo.js?v=4"></script>
  <script src="slides/slide-02b-observaciones.js?v=4"></script>
  <script src="slides/slide-13-retribucion.js?v=5"></script>
  <script src="slides/slide-14-cronograma.js?v=5"></script>
  <script src="slides/slide-14b-bibliografia.js?v=4"></script>
  <script src="slides/slide-15-cierre.js?v=4"></script>

  <!-- Motor principal -->
  <script src="js/main.js?v=4"></script>
</body>
</html>
